<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Too Many Beats</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- Loading overlay -->
<div id="loading-screen">
  <div id="loading-title">Too Many Beats</div>
  <div id="loading-sub">INITIALIZING LEVEL DATA</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-error"></div>
</div>

<div id="custom-cursor"></div>

<div id="ui">
  <div class="stat-block">
    <div class="stat-label">Score</div>
    <div class="stat-value" id="score-val">0</div>
  </div>
  <div class="stat-block" style="text-align:center">
    <div class="stat-label">Combo</div>
    <div class="stat-value" id="combo-val">x1</div>
  </div>
  <div class="stat-block" style="text-align:right">
    <div class="stat-label">Best</div>
    <div class="stat-value" id="best-val">0</div>
  </div>
</div>

<div id="level-tag"></div>

<div id="lane-indicator">
  <div class="lane-dot" id="dot-0"></div>
  <div class="lane-dot" id="dot-1"></div>
  <div class="lane-dot" id="dot-2"></div>
</div>

<div id="powerup-bar">
  <div class="pu-icon" id="pu-shield" title="Shield">🛡️</div>
  <div class="pu-icon" id="pu-slow"   title="Slow-Mo">⏱️</div>
  <div class="pu-icon" id="pu-magnet" title="Score Magnet">⚡</div>
</div>

<canvas id="gameCanvas"></canvas>

<!-- Level Select Overlay (shown on top of canvas when state=title) -->
<div id="level-select">
  <div id="ls-title">TOO MANY BEATS</div>
  <div id="ls-sub">SELECT YOUR LEVEL</div>

  <div id="ls-search-wrap">
    <input id="ls-search" type="text" placeholder="Search levels or songs..." autocomplete="off" spellcheck="false" />
    <span id="ls-search-count"></span>
  </div>

  <div id="ls-grid-wrap">
    <div id="ls-grid"><!-- cards injected by JS --></div>
  </div>
</div>

<!-- Launch bar (fixed bottom, visible with level select) -->
<div id="ls-launch">
  <div id="ls-launch-hint">PRESS SPACE TO LAUNCH</div>
  <div id="ls-launch-sub">click to select  ·  double-click or SPACE to launch  ·  ←→ to navigate</div>
  <div id="ls-best"></div>
  <div id="ls-version">Update (Beta) 1.01</div>
</div>
<canvas id="gameCanvas"></canvas>
<script src="/javascript/game.js"></script>
</body>
</html>
